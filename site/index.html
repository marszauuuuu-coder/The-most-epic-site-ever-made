<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Game - Ranking</title>
    
    <!-- Dołączenie biblioteki Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* GLASSMORPHISM - Globalne style */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2d3436;
        }

        /* Główny kontener Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px;
            margin: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        /* Przyciski i Inputy */
        input, button {
            padding: 10px 15px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }
        input {
            width: calc(100% - 30px);
            background: rgba(255, 255, 255, 0.5);
        }
        button {
            background: #6c5ce7;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #5f27cd;
        }

        /* Style Rankingu */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .leaderboard-item {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- Zmiana języka -->
    <div class="glass-panel" style="text-align: right;">
        <button onclick="setLanguage('pl')">PL</button>
        <button onclick="setLanguage('en')">EN</button>
    </div>

    <!-- Panel Logowania -->
    <div class="glass-panel" id="auth-panel">
        <h2 data-i18n="loginTitle">Dołącz do gry</h2>
        <input type="text" id="nickname" placeholder="Twój super nick...">
        <button onclick="login()" data-i18n="loginBtn">Wejdź</button>
    </div>

    <!-- Panel Gry (Ukryty przed logowaniem) -->
    <div class="glass-panel" id="game-panel" style="display:none; text-align: center;">
        <h2 data-i18n="gameTitle">Kliknij by zdobyć punkty!</h2>
        <button onclick="addEpicPoints(10)" style="font-size: 1.2rem; padding: 15px 30px;">+10 PKT</button>
    </div>

    <!-- Panel Rankingu -->
    <div class="glass-panel">
        <h2 data-i18n="leaderboardTitle">Top Gracze</h2>
        <!-- POPRAWKA 1: ID to teraz leaderboard-list -->
        <div class="leaderboard-list" id="leaderboard-list">
            <p style="text-align:center; color:#636e72;">Ładowanie rankingu...</p>
        </div>
    </div>

    <!-- Galeria -->
    <div class="glass-panel">
        <h2 data-i18n="galleryTitle">Galeria</h2>
        <p data-i18n="galleryDesc">Miejsce na epickie screeny z gry.</p>
        <!-- Tu wstawisz swoje tagi <img> -->
    </div>

    <script src="script.js"></script>
</body>
</html>
