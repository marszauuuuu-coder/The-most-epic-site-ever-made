<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Logowania & Rejestracji</title>
    <!-- Połączenie z arkuszem stylów CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Oficjalna biblioteka Supabase z serwera CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main class="container">
        <!-- Szklana karta formularza (Glassmorphism) -->
        <section id="auth-container" class="glass-card">
            <div class="auth-box">
                <h2>Witaj z powrotem</h2>
                <p class="auth-subtitle">Zaloguj się lub utwórz nowe konto</p>
                
                <div class="input-group">
                    <label for="auth-email">Adres e-mail</label>
                    <input type="email" id="auth-email" placeholder="nazwa@domena.pl" required>
                </div>
                
                <div class="input-group">
                    <label for="auth-password">Hasło</label>
                    <input type="password" id="auth-password" placeholder="••••••••" required>
                </div>
                
                <!-- Fizyczne przyciski akcji -->
                <div class="auth-buttons">
                    <button type="button" id="btn-login" class="btn-primary">Zaloguj się</button>
                    <button type="button" id="btn-register" class="btn-secondary">Zarejestruj</button>
                </div>
                
                <!-- Komunikaty zwrotne dla użytkownika -->
                <p id="auth-status"></p>
            </div>
        </section>
    </main>

    <!-- Połączenie z Twoim plikiem script.js -->
    <script src="script.js"></script>
</body>
</html>
