<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The most epic site ever made</title>
    <!-- Połączenie z osobnym plikiem CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animowane tło -->
    <div class="background-glow"></div>

    <!-- Przełącznik języków z ruchomym wskaźnikiem -->
    <div class="lang-switcher">
        <div class="nav-indicator" id="indicator"></div>
        <button class="lang-btn active" onclick="changeLanguage('pl', this)">PL</button>
        <button class="lang-btn" onclick="changeLanguage('en', this)">EN</button>
        <button class="lang-btn" onclick="changeLanguage('de', this)">DE</button>
    </div>

    <!-- Główna zawartość strony -->
    <div class="main-container">
        <h1 id="main-title">Najbardziej epicka strona, jaka kiedykolwiek powstała</h1>
        <p id="main-desc">Witamy w cyfrowym arcydziele. Ta strona została stworzona, aby zachwycać, inspirować i przekraczać granice zwykłego internetu. Poczuj czystą moc nowoczesnego designu.</p>
        <button class="epic-btn" id="main-btn" onclick="epicAction()">Doświadcz Epickości</button>
    </div>

    <!-- Epicka Przeglądarka Zdjęć -->
    <div class="gallery-container">
        <div class="gallery-slider">
            <img id="gallery-img" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80" alt="Epic view 1">
            <div class="gallery-caption" id="gallery-caption">Epicki Widok 1: Cyfrowe płótno przyszłości</div>
        </div>
        <button class="nav-btn prev-btn" onclick="prevImage()">&#10094;</button>
        <button class="nav-btn next-btn" onclick="nextImage()">&#10095;</button>
    </div>

    <!-- Połączenie z osobnym plikiem JS -->
    <script src="script.js"></script>
</body>
</html>
